<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
        color: #000;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      /* ── Header ── */
      .app-header {
        margin-bottom: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .app-icon {
        width: 38px;
        height: 38px;
        background: #000;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
        font-size: 1rem;
      }

      .app-header h2 {
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #000;
      }

      .app-header h2 span {
        font-weight: 700;
      }

      .app-header p {
        font-size: 0.82rem;
        color: #6b7280;
        margin-top: 0.3rem;
      }

      /* ── Scopes ── */
      .scopes {
        width: 100%;
        border: 1.5px solid #e5e7eb;
        border-radius: 0;
        padding: 1rem;
        margin-bottom: 1.5rem;
        text-align: left;
      }

      .scopes-label {
        font-size: 0.7rem;
        color: #9ca3af;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.6rem;
      }

      .scope-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: #374151;
        padding: 0.25rem 0;
      }

      .scope-item::before {
        content: "✓";
        color: #000;
        font-weight: 700;
        font-size: 0.75rem;
        flex-shrink: 0;
      }

      /* ── Divider ── */
      .divider {
        width: 100%;
        font-size: 0.78rem;
        color: #9ca3af;
        margin-bottom: 0.875rem;
        text-align: left;
      }

      /* ── Form ── */
      form {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        height: 2.4rem;
        padding: 0 0.9rem;
        font-family: inherit;
        font-size: 0.875rem;
        color: #000;
        background: #fff;
        border: 1.5px solid #e5e7eb;
        border-radius: 0;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: #000;
      }

      input::placeholder {
        color: #9ca3af;
      }

      /* ── Actions ── */
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.65rem;
        margin-top: 0.25rem;
      }

      button {
        height: 2.4rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        border-radius: 0;
        letter-spacing: -0.01em;
        transition: opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button:hover {
        opacity: 0.75;
      }

      .btn-allow {
        background: #000;
        color: #fff;
        border: 1.5px solid #000;
      }

      .btn-deny {
        background: #fff;
        color: #000;
        border: 1.5px solid #e5e7eb;
      }

      /* ── Footer ── */
      .footer {
        width: 100%;
        font-size: 0.78rem;
        color: #6b7280;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1.5px solid #f3f4f6;
        text-align: center;
      }

      .footer strong {
        color: #000;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="app-header">
        <div class="app-icon">🔐</div>
        <h2><span id="app-name">App</span> wants access</h2>
        <p>Sign in to your account to continue</p>
      </div>

      <div class="scopes">
        <div class="scopes-label">Permissions requested</div>
        <div id="scope-list"></div>
      </div>

      <div class="divider">Enter your credentials to allow access</div>

      <form method="POST" action="/o/3rd-party-client/authorize">
        <input type="hidden" name="client_id" id="f-client_id" />
        <input type="hidden" name="redirect_uri" id="f-redirect_uri" />
        <input type="hidden" name="scope" id="f-scope" />
        <input type="hidden" name="state" id="f-state" />

        <input
          type="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <input
          type="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />

        <div class="actions">
          <button type="button" class="btn-deny" id="btn-deny">Deny</button>
          <button type="submit" class="btn-allow">Allow</button>
        </div>
      </form>

      <div class="footer">
        Your credentials are verified by the auth server.
        <strong id="app-name-footer"></strong> will not see your password.
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("client_id") ?? "";
      const redirectUri = params.get("redirect_uri") ?? "";
      const scope = params.get("scope") ?? "openid";
      const state = params.get("state") ?? "";

      document.getElementById("f-client_id").value = clientId;
      document.getElementById("f-redirect_uri").value = redirectUri;
      document.getElementById("f-scope").value = scope;
      document.getElementById("f-state").value = state;

      const SCOPE_LABELS = {
        openid: "Verify your identity",
        email: "Read your email address",
        profile: "Read your name and profile picture",
      };

      const scopeList = document.getElementById("scope-list");
      scope.split(" ").forEach((s) => {
        const div = document.createElement("div");
        div.className = "scope-item";
        div.textContent = SCOPE_LABELS[s] ?? s;
        scopeList.appendChild(div);
      });

      fetch(`/o/3rd-party-client/${clientId}`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("app-name").textContent = data.name;
          document.getElementById("app-name-footer").textContent =
            data.name + " ";
        });

      document.getElementById("btn-deny").addEventListener("click", () => {
        const url = new URL(redirectUri);
        url.searchParams.set("error", "access_denied");
        if (state) url.searchParams.set("state", state);
        window.location.href = url.toString();
      });
    </script>
  </body>
</html>
