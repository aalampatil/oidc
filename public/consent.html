<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize App</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
      }

      .app-header {
        margin-bottom: 2rem;
      }

      .app-icon {
        width: 40px;
        height: 40px;
        background: #000;
        border-radius: 8px;
        display: inline-grid;
        place-items: center;
        font-size: 1.1rem;
        margin-bottom: 1.25rem;
      }

      .app-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #000;
        margin-bottom: 0.25rem;
      }

      .app-header h2 span {
        font-weight: 700;
      }

      .app-header p {
        font-size: 0.85rem;
        color: #6b7280;
      }

      .scopes {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.75rem;
      }

      .scopes-label {
        font-size: 0.72rem;
        color: #9ca3af;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.6rem;
      }

      .scope-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: #374151;
        padding: 0.25rem 0;
      }

      .scope-item::before {
        content: "✓";
        color: #000;
        font-weight: 700;
        font-size: 0.75rem;
      }

      .divider {
        font-size: 0.78rem;
        color: #9ca3af;
        margin-bottom: 1rem;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 0.65rem 0.875rem;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-bottom: 0.65rem;
        outline: none;
        color: #111;
        transition: border-color 0.15s;
        background: #fff;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: #000;
      }

      input::placeholder {
        color: #9ca3af;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.65rem;
        margin-top: 0.25rem;
      }

      button {
        padding: 0.65rem;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }

      button:hover {
        opacity: 0.75;
      }

      .btn-allow {
        background: #000;
        color: #fff;
      }

      .btn-deny {
        background: #fff;
        color: #111;
        border: 1px solid #e5e7eb;
      }

      .footer {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #f3f4f6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="app-header">
        <div class="app-icon">🔐</div>
        <h2><span id="app-name">App</span> wants access</h2>
        <p>Sign in to your account to continue</p>
      </div>

      <div class="scopes">
        <div class="scopes-label">Permissions requested</div>
        <div id="scope-list"></div>
      </div>

      <div class="divider">Enter your credentials to allow access</div>

      <form method="POST" action="/o/3rd-party-client/authorize">
        <input type="hidden" name="client_id" id="f-client_id" />
        <input type="hidden" name="redirect_uri" id="f-redirect_uri" />
        <input type="hidden" name="scope" id="f-scope" />
        <input type="hidden" name="state" id="f-state" />

        <input
          type="email"
          name="email"
          placeholder="Email"
          autocomplete="email"
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
        />

        <div class="actions">
          <button type="button" class="btn-deny" id="btn-deny">Deny</button>
          <button type="submit" class="btn-allow">Allow</button>
        </div>
      </form>

      <div class="footer">
        Your credentials are verified by the auth server.
        <strong id="app-name-footer"></strong> will not see your password.
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("client_id") ?? "";
      const redirectUri = params.get("redirect_uri") ?? "";
      const scope = params.get("scope") ?? "openid";
      const state = params.get("state") ?? "";

      document.getElementById("f-client_id").value = clientId;
      document.getElementById("f-redirect_uri").value = redirectUri;
      document.getElementById("f-scope").value = scope;
      document.getElementById("f-state").value = state;

      const SCOPE_LABELS = {
        openid: "Verify your identity",
        email: "Read your email address",
        profile: "Read your name and profile picture",
      };

      const scopeList = document.getElementById("scope-list");
      scope.split(" ").forEach((s) => {
        const div = document.createElement("div");
        div.className = "scope-item";
        div.textContent = SCOPE_LABELS[s] ?? s;
        scopeList.appendChild(div);
      });

      fetch(`/o/3rd-party-client/${clientId}`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("app-name").textContent = data.name;
          document.getElementById("app-name-footer").textContent =
            data.name + " ";
        });

      document.getElementById("btn-deny").addEventListener("click", () => {
        const url = new URL(redirectUri);
        url.searchParams.set("error", "access_denied");
        if (state) url.searchParams.set("state", state);
        window.location.href = url.toString();
      });
    </script>
  </body>
</html>
