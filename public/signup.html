<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
        color: #111;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: 100%;
        max-width: 360px;
      }

      .header {
        margin-bottom: 2rem;
      }

      .icon {
        width: 36px;
        height: 36px;
        background: #000;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .subtitle {
        font-size: 0.85rem;
        color: #6b7280;
        margin-top: 0.3rem;
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 0.875rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      label {
        font-size: 0.825rem;
        font-weight: 500;
        color: #111;
      }

      input {
        width: 100%;
        height: 2.25rem;
        padding: 0 0.75rem;
        font-family: inherit;
        font-size: 0.875rem;
        color: #111;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.15s;
      }

      input::placeholder {
        color: #9ca3af;
      }
      input:focus {
        border-color: #000;
      }

      input[aria-invalid="true"] {
        border-color: #ef4444;
      }

      .hint {
        font-size: 0.74rem;
        color: #9ca3af;
      }

      .hint.error {
        color: #ef4444;
      }

      .error-msg {
        display: none;
        font-size: 0.8rem;
        color: #ef4444;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        background: #fef2f2;
      }

      .success-msg {
        display: none;
        font-size: 0.8rem;
        color: #16a34a;
        border: 1px solid #bbf7d0;
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        background: #f0fdf4;
      }

      button[type="submit"] {
        width: 100%;
        height: 2.25rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        color: #fff;
        background: #000;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: opacity 0.15s;
      }

      button[type="submit"]:hover {
        opacity: 0.8;
      }
      button[type="submit"]:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .spinner {
        display: none;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .terms {
        font-size: 0.74rem;
        color: #9ca3af;
        text-align: center;
        line-height: 1.5;
      }

      .terms a {
        color: #111;
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .footer {
        text-align: center;
        font-size: 0.8rem;
        color: #6b7280;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #f3f4f6;
      }

      .footer a {
        color: #111;
        font-weight: 500;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="icon">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
            <path d="M20 21a8 8 0 1 0-16 0" />
          </svg>
        </div>
        <h1>Create an account</h1>
        <p class="subtitle">Enter your details to get started</p>
      </div>

      <form class="form" id="signupForm" novalidate>
        <div id="errorMsg" class="error-msg" role="alert"></div>
        <div id="successMsg" class="success-msg" role="status"></div>

        <div class="field-row">
          <div class="field">
            <label for="firstName">First name</label>
            <input
              id="firstName"
              name="firstName"
              type="text"
              autocomplete="given-name"
              placeholder="John"
              required
            />
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input
              id="lastName"
              name="lastName"
              type="text"
              autocomplete="family-name"
              placeholder="Doe"
            />
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="••••••••"
            required
          />
          <span class="hint">Must be at least 8 characters</span>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            placeholder="••••••••"
            required
          />
          <span class="hint error" id="confirmHint" style="display: none">
            Passwords do not match
          </span>
        </div>

        <button type="submit" id="submitBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Create account</span>
        </button>

        <p class="terms">
          By creating an account you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>
      </form>

      <div class="footer">
        Already have an account? <a href="/o/authenticate">Sign in</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("signupForm");
      const submitBtn = document.getElementById("submitBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirmPassword");
      const confirmHint = document.getElementById("confirmHint");
      const params = new URLSearchParams(window.location.search);

      confirmInput.addEventListener("input", () => {
        const mismatch =
          confirmInput.value && confirmInput.value !== passwordInput.value;
        confirmHint.style.display = mismatch ? "block" : "none";
        confirmInput.setAttribute("aria-invalid", mismatch ? "true" : "false");
      });

      const showError = (msg) => {
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
        successMsg.style.display = "none";
      };
      const showSuccess = (msg) => {
        successMsg.textContent = msg;
        successMsg.style.display = "block";
        errorMsg.style.display = "none";
      };
      const hideAll = () => {
        errorMsg.style.display = "none";
        successMsg.style.display = "none";
      };

      const setLoading = (on) => {
        submitBtn.disabled = on;
        spinner.style.display = on ? "block" : "none";
        btnText.textContent = on ? "Creating account…" : "Create account";
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideAll();

        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;

        if (!firstName || !email || !password || !confirmPassword) {
          showError("Please fill in all required fields.");
          return;
        }
        if (password.length < 8) {
          showError("Password must be at least 8 characters.");
          return;
        }
        if (password !== confirmPassword) {
          showError("Passwords do not match.");
          return;
        }

        setLoading(true);

        try {
          const res = await fetch("/o/authenticate/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              firstName,
              lastName,
              email,
              password,
              client_id: params.get("client_id"),
              redirect_uri: params.get("redirect_uri"),
              state: params.get("state"),
              nonce: params.get("nonce"),
            }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showError(
              data.message || "Something went wrong. Please try again.",
            );
          } else if (data.redirect) {
            window.location.href = data.redirect;
          } else {
            showSuccess("Account created! Redirecting…");
            setTimeout(() => {
              window.location.href = `/o/authenticate${window.location.search}`;
            }, 1500);
          }
        } catch {
          showError("Something went wrong. Please try again.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
