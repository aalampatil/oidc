<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
        color: #111;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: 100%;
        max-width: 360px;
      }

      .header {
        margin-bottom: 2rem;
      }

      .icon {
        width: 36px;
        height: 36px;
        background: #000;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .subtitle {
        font-size: 0.85rem;
        color: #6b7280;
        margin-top: 0.3rem;
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 0.875rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      label {
        font-size: 0.825rem;
        font-weight: 500;
        color: #111;
      }

      .forgot {
        font-size: 0.8rem;
        color: #6b7280;
        text-decoration: none;
        transition: color 0.15s;
      }

      .forgot:hover {
        color: #111;
      }

      input {
        width: 100%;
        height: 2.25rem;
        padding: 0 0.75rem;
        font-family: inherit;
        font-size: 0.875rem;
        color: #111;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.15s;
      }

      input::placeholder {
        color: #9ca3af;
      }
      input:focus {
        border-color: #000;
      }

      .error-msg {
        display: none;
        font-size: 0.8rem;
        color: #ef4444;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        background: #fef2f2;
      }

      button[type="submit"] {
        width: 100%;
        height: 2.25rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        color: #fff;
        background: #000;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: opacity 0.15s;
      }

      button[type="submit"]:hover {
        opacity: 0.8;
      }
      button[type="submit"]:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .spinner {
        display: none;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .footer {
        text-align: center;
        font-size: 0.8rem;
        color: #6b7280;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #f3f4f6;
      }

      .footer a {
        color: #111;
        font-weight: 500;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="icon">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
            <path d="M20 21a8 8 0 1 0-16 0" />
          </svg>
        </div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account to continue</p>
      </div>

      <form class="form" id="loginForm" novalidate>
        <div id="errorMsg" class="error-msg" role="alert"></div>

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="#" class="forgot">Forgot password?</a>
          </div>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" id="submitBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Sign in</span>
        </button>
      </form>

      <div class="footer">
        Don't have an account? <a href="/o/authenticate/register">Sign up</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      const errorMsg = document.getElementById("errorMsg");
      const params = new URLSearchParams(window.location.search);

      const showError = (msg) => {
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
      };
      const hideError = () => {
        errorMsg.style.display = "none";
      };

      const setLoading = (on) => {
        submitBtn.disabled = on;
        spinner.style.display = on ? "block" : "none";
        btnText.textContent = on ? "Signing in…" : "Sign in";
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showError("Please fill in all fields.");
          return;
        }

        setLoading(true);

        try {
          const res = await fetch("/o/authenticate/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email,
              password,
              client_id: params.get("client_id"),
              redirect_uri: params.get("redirect_uri"),
              state: params.get("state"),
              nonce: params.get("nonce"),
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            showError(
              data.message || "Something went wrong. Please try again.",
            );
          } else if (data.redirect) {
            window.location.href = data.redirect;
          } else if (data.token) {
            // store token and redirect to app
            localStorage.setItem("token", data.token);
            window.location.href = params.get("redirect_uri") ?? "/";
          }
        } catch {
          showError("Something went wrong. Please try again.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
